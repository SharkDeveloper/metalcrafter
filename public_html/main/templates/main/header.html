{% load static %}

<style>
.site-header {
    background-color: rgba(17, 24, 39, 0.9);
    backdrop-filter: blur(10px);
    position: fixed;
    width: 100%;
    z-index: 1000;
    border-bottom: 1px solid rgba(55, 65, 81, 0.5);
    font-family: 'Inter', sans-serif;
}

.header-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 1rem;
}

.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.25rem 0;
}

.logo {
    display: flex;
    align-items: center;
    text-decoration: none;
}

.logo-text {
    font-size: 1.5rem;
    font-weight: 800;
    background: linear-gradient(90deg, #2563eb, #ea580c);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.nav-links {
    display: flex;
    list-style: none;
    gap: 2rem;
}

.nav-links a {
    color: #d1d5db;
    text-decoration: none;
    font-weight: 500;
    transition: color 0.3s ease;
    position: relative;
}

.nav-links a:hover { color: #f9fafb; }

.nav-links a::after {
    content: '';
    position: absolute;
    bottom: -5px;
    left: 0;
    width: 0;
    height: 2px;
    background: linear-gradient(90deg, #2563eb, #ea580c);
    transition: width 0.3s ease;
}

.nav-links a:hover::after { width: 100%; }

.mobile-menu-btn {
    display: none;
    background: none;
    border: none;
    color: #d1d5db;
    cursor: pointer;
}

@media (max-width: 768px) {
    .nav-links {
        position: fixed;
        top: 70px;
        left: -100%;
        width: 100%;
        height: calc(100vh - 70px);
        background-color: rgba(17, 24, 39, 0.95);
        flex-direction: column;
        align-items: center;
        padding-top: 2rem;
        transition: left 0.3s ease;
        gap: 1.5rem;
    }

    .nav-links.active { left: 0; }
    .mobile-menu-btn { display: block; }
}
</style>

<header class="site-header">
    <div class="header-container">
        <nav class="navbar">
            <a href="{% url 'index' %}" class="logo">
                <span class="logo-text">Shamonov.corp</span>
            </a>

            <button class="mobile-menu-btn" id="mobileMenuBtn">
                <i data-feather="menu" id="menuIcon"></i>
            </button>

            <ul class="nav-links" id="navLinks">
                <li><a href="{% url 'index' %}">Главная</a></li>
                <li><a href="{% url 'services' %}">Услуги</a></li>
                <li><a href="{% url 'projects' %}">Проекты</a></li>
                <li><a href="{% url 'contacts' %}">Контакты</a></li>
            </ul>
        </nav>
    </div>
</header>


<script>
document.addEventListener('DOMContentLoaded', function () {
    const btn = document.getElementById('mobileMenuBtn');
    const nav = document.getElementById('navLinks');
    const icon = document.getElementById('menuIcon');

    if (btn) {
        btn.addEventListener('click', function () {
            nav.classList.toggle('active');
            const isOpen = nav.classList.contains('active');
            icon.setAttribute('data-feather', isOpen ? 'x' : 'menu');
            feather.replace();
        });
    }
});
</script>
